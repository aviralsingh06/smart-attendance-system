<!DOCTYPE html>
<html>
<head>
  <title>Smart Attendance System</title>
</head>
<body>

<h1>Smart Attendance System</h1>

<!-- Add Student -->
<h2>Add Student</h2>
<input id="new-student-id" placeholder="ID">
<input id="new-student-name" placeholder="Name">
<button onclick="addStudent()">Add Student</button>

<!-- Date -->
<h2>Select Date</h2>
<input type="date" id="attendance-date">

<!-- Students -->
<h2>Students</h2>
<div id="students-list"></div>

<!-- Today's Attendance -->
<h2>Today's Attendance</h2>
<div id="todays-attendance-list"></div>

<!-- Stats -->
<h2>Stats</h2>
<div id="stats-list"></div>

<!-- Summary -->
<h2>Summary</h2>
<p>Present: <span id="total-present">0</span></p>
<p>Absent: <span id="total-absent">0</span></p>

<!-- Share -->
<button onclick="shareReport()">📤 Share Absent Students</button>

<script src="script.js"></script>

</body>
</html>
